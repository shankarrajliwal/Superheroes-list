<!-- 🧊 Card -->
<div class="card">

  <!-- 🔍 Search -->
  <div class="top">
    <input type="text" placeholder="Enter your favourite superhero name">
    <button>Search</button>
  </div>

  <!-- 🖼 Image Area -->
  <div class="image-area">
    <img class="photo" src="https://i.imgur.com/6kK5Z5R.png" alt="Image of your hero">
  </div>

  <!-- 📄 Info -->
  <div class="info">
    <h2 class="name">Name of your hero</h2>
    <p class="power"><strong>Superpower:-</strong></p>
    <p class="abilities"><strong>Abilities:-</strong></p>
  </div>

  <!-- ❌ Error -->
  <p class="error"></p>

</div>
